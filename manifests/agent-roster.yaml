name: "aeo-geo-agent-kit"
description: "Agent roster for AEO, GEO, local search, Maps, schema, reputation, links, and LLM visibility audits."
version: "0.1.0"
coordinator:
  id: "main-coordinator"
  prompt: "skills/aeo-geo-audit/agents/subagents/main-coordinator.md"
  owns:
    - "scope"
    - "evidence_log"
    - "scorecard"
    - "final_report"
agents:
  - id: "crawler-technical"
    prompt: "skills/aeo-geo-audit/agents/subagents/crawler-technical.md"
    owns:
      - "crawlability"
      - "indexability"
      - "metadata"
      - "internal_links"
      - "technical_blockers"
  - id: "schema-entity"
    prompt: "skills/aeo-geo-audit/agents/subagents/schema-entity.md"
    owns:
      - "schema"
      - "entity_ids"
      - "sameAs"
      - "NAP_alignment"
  - id: "aeo-geo-content"
    prompt: "skills/aeo-geo-audit/agents/subagents/aeo-geo-content.md"
    owns:
      - "answer_readiness"
      - "buyer_prompts"
      - "proof_gaps"
      - "content_roadmap"
  - id: "local-maps-nap"
    prompt: "skills/aeo-geo-audit/agents/subagents/local-maps-nap.md"
    owns:
      - "Google_Maps"
      - "GBP"
      - "citations"
      - "location_pages"
  - id: "reputation-reviews"
    prompt: "skills/aeo-geo-audit/agents/subagents/reputation-reviews.md"
    owns:
      - "reviews"
      - "sentiment"
      - "owner_responses"
      - "trust_proof"
  - id: "authority-links"
    prompt: "skills/aeo-geo-audit/agents/subagents/authority-links.md"
    owns:
      - "backlinks"
      - "local_mentions"
      - "industry_citations"
      - "digital_PR"
  - id: "llm-visibility"
    prompt: "skills/aeo-geo-audit/agents/subagents/llm-visibility.md"
    owns:
      - "AI_answer_tests"
      - "citations"
      - "competitor_mentions"
      - "source_patterns"
