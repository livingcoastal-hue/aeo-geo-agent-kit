<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="640" viewBox="0 0 1600 640" role="img" aria-labelledby="title desc">
  <title id="title">AEO/GEO Agent Kit</title>
  <desc id="desc">Repository banner for an AEO and GEO agent kit focused on AI search, Google Maps, schema, reviews, and LLM visibility.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#071116"/>
      <stop offset="0.48" stop-color="#0f172a"/>
      <stop offset="1" stop-color="#111827"/>
    </linearGradient>
    <linearGradient id="tealBlue" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#2dd4bf"/>
      <stop offset="1" stop-color="#60a5fa"/>
    </linearGradient>
    <linearGradient id="amber" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fbbf24"/>
      <stop offset="1" stop-color="#fb7185"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="10" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <pattern id="grid" width="56" height="56" patternUnits="userSpaceOnUse">
      <path d="M56 0H0V56" fill="none" stroke="#1f3442" stroke-width="1" opacity="0.55"/>
    </pattern>
  </defs>

  <rect width="1600" height="640" fill="url(#bg)"/>
  <rect width="1600" height="640" fill="url(#grid)" opacity="0.45"/>

  <g opacity="0.45">
    <path d="M94 458 C280 330, 385 518, 560 386 S836 190, 1038 276 S1260 440, 1480 212" fill="none" stroke="#2dd4bf" stroke-width="2"/>
    <path d="M122 194 C280 260, 376 90, 552 152 S852 336, 1008 188 S1266 98, 1494 328" fill="none" stroke="#60a5fa" stroke-width="2"/>
  </g>

  <g filter="url(#glow)">
    <circle cx="1165" cy="180" r="88" fill="#0f766e" opacity="0.32"/>
    <circle cx="1310" cy="382" r="126" fill="#2563eb" opacity="0.24"/>
    <circle cx="1034" cy="430" r="58" fill="#f59e0b" opacity="0.22"/>
  </g>

  <g transform="translate(948 124)">
    <path d="M172 44c-74 0-134 60-134 134 0 116 134 264 134 264s134-148 134-264c0-74-60-134-134-134z" fill="#101827" stroke="url(#tealBlue)" stroke-width="6"/>
    <circle cx="172" cy="178" r="58" fill="none" stroke="#2dd4bf" stroke-width="6"/>
    <circle cx="172" cy="178" r="13" fill="#f8fafc"/>
    <path d="M46 112h252M70 262h204M104 352h136" stroke="#334155" stroke-width="4" stroke-linecap="round"/>
    <circle cx="46" cy="112" r="9" fill="#60a5fa"/>
    <circle cx="298" cy="112" r="9" fill="#2dd4bf"/>
    <circle cx="70" cy="262" r="9" fill="#f59e0b"/>
    <circle cx="274" cy="262" r="9" fill="#60a5fa"/>
    <circle cx="104" cy="352" r="9" fill="#2dd4bf"/>
    <circle cx="240" cy="352" r="9" fill="#f59e0b"/>
  </g>

  <g transform="translate(96 102)">
    <rect x="0" y="0" width="190" height="42" rx="21" fill="#10242b" stroke="#1f6f78"/>
    <circle cx="25" cy="21" r="7" fill="#2dd4bf"/>
    <text x="46" y="27" fill="#a7f3d0" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="700">AI search readiness</text>

    <text x="0" y="156" fill="#f8fafc" font-family="Inter, Arial, sans-serif" font-size="86" font-weight="900" letter-spacing="0">AEO/GEO</text>
    <text x="0" y="242" fill="url(#tealBlue)" font-family="Inter, Arial, sans-serif" font-size="86" font-weight="900" letter-spacing="0">Agent Kit</text>
    <text x="4" y="304" fill="#cbd5e1" font-family="Inter, Arial, sans-serif" font-size="30" font-weight="500">Claude + Codex compatible audit agents</text>

    <g transform="translate(0 360)">
      <rect x="0" y="0" width="186" height="44" rx="8" fill="#121c27" stroke="#26384a"/>
      <text x="18" y="29" fill="#e2e8f0" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700">AI Search</text>
      <rect x="204" y="0" width="184" height="44" rx="8" fill="#121c27" stroke="#26384a"/>
      <text x="222" y="29" fill="#e2e8f0" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700">Google Maps</text>
      <rect x="406" y="0" width="136" height="44" rx="8" fill="#121c27" stroke="#26384a"/>
      <text x="424" y="29" fill="#e2e8f0" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700">Schema</text>
      <rect x="560" y="0" width="142" height="44" rx="8" fill="#121c27" stroke="#26384a"/>
      <text x="578" y="29" fill="#e2e8f0" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700">Reviews</text>
      <rect x="720" y="0" width="196" height="44" rx="8" fill="#121c27" stroke="#26384a"/>
      <text x="738" y="29" fill="#e2e8f0" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700">LLM Visibility</text>
    </g>
  </g>

  <g opacity="0.9">
    <circle cx="1358" cy="118" r="5" fill="#fbbf24"/>
    <circle cx="1418" cy="160" r="5" fill="#2dd4bf"/>
    <circle cx="1458" cy="498" r="5" fill="#60a5fa"/>
    <circle cx="866" cy="102" r="5" fill="#2dd4bf"/>
    <circle cx="832" cy="518" r="5" fill="#fbbf24"/>
  </g>
</svg>
